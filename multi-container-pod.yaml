apiVersion: v1
kind: Pod
metadata:
  name: multi-container-demo
spec:
  containers:
    - name: web
      image: httpd:2.4
      ports:
        - containerPort: 8081
    - name: api
      image: image-registry.openshift-image-registry.svc:5000/jaromir-sindlar-dev/api:latest
      ports:
        - containerPort: 5000
    - name: worker
      image: image-registry.openshift-image-registry.svc:5000/jaromir-sindlar/worker:latest
