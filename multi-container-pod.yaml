apiVersion: v1
kind: Pod
metadata:
  name: multi-container-demo
spec:
  containers:
    - name: web
      image: httpd:2.4
      ports:
        - containerPort: 8080
    - name: api
      image: python:3.11-slim
      command: ["python", "/app/app.py"]
      ports:
        - containerPort: 5000
    - name: worker
      image: python:3.11-slim
      command: ["python", "/app/worker.py"]
